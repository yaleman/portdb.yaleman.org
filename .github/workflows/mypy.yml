---
name: mypy

"on":
  push:
    branches:
      - main # Set a branch to deploy
  pull_request:

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Running mypy
        run: |
          python -m pip install --quiet --no-cache-dir --upgrade uv
          uv run mypy --strict *.py tests/
